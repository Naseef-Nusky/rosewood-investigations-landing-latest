# Nginx config for Rosewood Investigations (rosewoodinvestigations.net)
# On droplet: sudo cp nginx-rosewood.conf /etc/nginx/sites-available/rosewood-landing
# Then: sudo ln -s /etc/nginx/sites-available/rosewood-landing /etc/nginx/sites-enabled/
#       sudo rm -f /etc/nginx/sites-enabled/default
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name rosewoodinvestigations.net www.rosewoodinvestigations.net;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
